version: '3.8'

services:
  db:
    image: postgres:13-alpine
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    restart: unless-stopped

  web:
    build: ./app
    environment:
      DB_HOST: db
      DB_NAME: mydb
      DB_USER: user
      DB_PASSWORD: password
    depends_on:
      - db
    networks:
      - internal
    restart: unless-stopped

  proxy:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
      - "5000:5000"   # кастомный порт для проброса к БД
    depends_on:
      - web
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
